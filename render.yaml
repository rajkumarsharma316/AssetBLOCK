# render.yaml
# Configuration for deploying the AssetBlock backend to Render.com
services:
  - type: web
    name: assetblock-backend
    env: node
    plan: free
    # Since it's a monorepo, we tell Render the code is in the backend folder
    rootDir: backend
    # Build command to install dependencies
    buildCommand: npm install
    # Start command to run the server
    startCommand: npm start
    # We specify the Node version to ensure compatibility
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3001
      - key: HORIZON_URL
        sync: false
      - key: NETWORK_PASSPHRASE
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: ADMIN_WALLET
        sync: false
    # Persistent Disk Configuration (COMMENTED OUT FOR FREE TIER)
    # Note: Because this is commented out, your SQLite database (cpe.db) will be deleted
    # whenever the server restarts. To keep data permanently, uncomment this and add a card,
    # or switch to a cloud database like Supabase/Neon.
    # disk:
    #   name: assetblock-data
    #   sizeGB: 1
    #   mountPath: /opt/render/project/src/backend/data
